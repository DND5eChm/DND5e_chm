天界恐怖 Celestial 
Horrors<BR>许多凡人会向天使祈祷，他们仰起布满泪痕的脸庞仰望苍穹，期盼能寻得一位强大存在来解救苦难、平息冤屈或是施以怜悯。然而，回应这些祈祷的神明未曾言明的是，这些代神降世的天使，往往比世人眼中的恶魔与魔鬼更为骇人。这些恐怖之物起源于天界，有的本来面目就已令人毛骨悚然；有的则是在回应凡人永无止境的索求时，由原本良善温和的形态逐渐扭曲异化而成。
