<H2>子职 Subclasses</H2>
<P>本节将提供七个全新的子职业：苏生师（奇械师）、精魂学院（吟游诗人）、坟墓领域（牧师）、幽邃戍卫（游侠）、鬼魅（游荡者）、幽影术法（术士）以及死灵宗主（魔契师）。奇械师职业的详细规则见《艾伯伦：奇械锻炉》。</P>
