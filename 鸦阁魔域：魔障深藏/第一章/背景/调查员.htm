<H3>调查员 Investigator</H3>
<P><STRONG>属性值：</STRONG>智力、感知、魅力<BR><STRONG>专长：</STRONG>锐眼或一项由你选择的黑暗赠礼专长（见本章稍后的专长小节）<BR>技能熟练：洞悉和调查<BR>工具熟练：易容工具<BR>装备：选择A或B：(A) 
易容工具，镣铐，铲子，旅行服装，三个小瓶，以及16GP；或(B)50GP。</P>
<P>你不懈地追寻着真相。也许你曾目睹过某种超常或恐怖的事物，如今只渴望揭开它的终极谜团；又或者，你是被世俗的公理与正义所驱使寻求真相。无论你所卷入的案件是纯粹的地方犯罪，还是骇人的怪异阴谋，你都被一种强烈的冲动所支配，想要去揭露那些被他人极力掩藏的秘密。</P>
