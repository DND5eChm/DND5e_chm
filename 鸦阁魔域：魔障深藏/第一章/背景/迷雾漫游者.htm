<H3>迷雾漫游者 Mist Wanderer</H3>
<P><STRONG>属性值：</STRONG>敏捷、体质、感知<BR>专长：一项由你选择的黑暗赠礼专长（见本章稍后的专长小节；推荐选择迷雾行者）<BR>技能熟练：求生和隐匿<BR>工具熟练：选择一种工匠工具<BR>装备：选择A或B：(A)工匠工具（同上），油灯，燃油（5扁瓶），小包，绳索，火绒盒，旅行服装，以及30GP；或(B)50GP。</P>
<P>你曾拥有一个熟悉的家园。直到某一天，诡异的迷雾升腾而起，将你卷入了一处恐惧领域。自那以后，你便在各个领域间流浪，在变幻莫测的迷雾中艰难跋涉，只为寻找那遥不可及的归途。在这些被诅咒的界域里度过的岁月已经彻底改变了你，但你仍在迷雾各处的流浪者聚落中找到了些许慰藉。</P>
