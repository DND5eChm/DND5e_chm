<H3>降灵师 Spirit Medium</H3>
<P>属性值：体质、智力、感知<BR><STRONG>专长：</STRONG>一项由你选择的黑暗赠礼专长（见本章稍后的专长小节；推荐选择汇灵低语）<BR><STRONG>技能熟练：</STRONG>洞悉和宗教<BR><STRONG>工具熟练：</STRONG>选择一种赌具<BR><STRONG>装备：</STRONG>选择A或B：(A)匕首，赌具（同上），篮子，铃铛，8根蜡烛，墨水，墨水笔，纸（5张），火绒盒，旅行服装，以及32GP；或(B)50GP。</P>
<P>通过奇诡的仪式与宿命般的遭遇，你发觉自己与那些死者和受诅者的灵魂之间，存在着某种极为独特的链接。你的肉身化作了导引这些灵体的灵媒，它们则赐予你来自彼岸的洞察。然而，这些怨魂的意图并不总是那么纯粹，它们赐下的恩惠往往伴随着挥之不去的骇人代价。</P>
