<H3>噩梦缠身者 Haunted One</H3>
<P><STRONG>属性值：</STRONG>体质、感知、魅力<BR><STRONG>专长：</STRONG>幸存者或一项由你选择的黑暗赠礼专长（见本章稍后的专长小节）<BR><STRONG>技能熟练：</STRONG>奥秘和求生<BR><STRONG>工具熟练：</STRONG>选择一种赌具<BR><STRONG>装备：</STRONG>选择A或B：(A)赌具（同上），撬棍，圣水（1扁瓶），镜子，燃油（2扁瓶），信号笛，火绒盒，旅行服装，五支火把，水袋，以及14GP；或(B)50GP。</P>
<P>你始终被过去的阴霾所纠缠。无论那是一场孤立的惨剧，还是无数痛苦瞬间的堆叠，那些降临在你身上的遭遇已经化作了无法撼动的重担。你曾试图将其深埋心底并仓皇逃离，却终是徒劳；它无法被利刃斩杀，也无法被魔法放逐。尽管如此，你依然继续前行。</P>
