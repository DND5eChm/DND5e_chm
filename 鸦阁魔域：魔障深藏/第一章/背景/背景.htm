<H2>背景 Backgrounds</H2>
<P>本节提供的背景适用于恐怖冒险的角色起源，其格式与《玩家手册》中的背景完全一致。其中有两个背景——迷雾漫游者与降灵师，提供的是黑暗赠礼专长而非起源专长；这些专长详见本章末尾。而噩梦缠身者与调查员背景则允许你在起源专长与黑暗赠礼专长之间做出选择，从而让你能量身定制角色过去与邪恶力量之间的渊源。</P>
