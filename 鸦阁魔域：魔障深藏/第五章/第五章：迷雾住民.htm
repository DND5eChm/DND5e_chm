<H1>第五章 迷雾住民 Denizens of the Mists</H1>
<P>冷酷的杜拉罕击倒了它的受害者，又将一颗骇人的死亡之颅收为随从<BR>恐怖之物盘踞于迷雾之中。本章首先将提供一系列指导，帮助身为DM的你利用怪物来营造可怕的遭遇战。随后，这里收录了一系列恐怖的怪物以及坚毅的怪物猎人，以供你在恐惧领域的冒险中使用。</P>
