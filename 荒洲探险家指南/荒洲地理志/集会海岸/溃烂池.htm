<H2><FONT color=#800000>溃烂池 Festerwill Pool</FONT> </H2>
<P> 
 溃烂池的泉水翻腾冒泡，散发出强烈的硫磺气味，弥漫整个山谷，而附近的岩石则因矿物质沉积而变色。水池本身是一片绿色的湖泊，水藻与杂草丛生，位于一片崎岖山谷的底部，周围环绕着布满苔藓、枝叶凋零的树木。这片湖泊和四周的岩壁正是贪婪而丑陋的血羽鸟妖的栖身之所。这些鸟妖成群结队，在空中尖叫着，把它们的猎物带到这里来吞食，血淋淋的残骸落入下方微咸的水中。在它们的主母乌娅达的庇护下，血羽鸟妖将这片区域作为她们的领地，将各类饰物和小玩意藏在她们肮脏的巢穴中。 </P></body>
