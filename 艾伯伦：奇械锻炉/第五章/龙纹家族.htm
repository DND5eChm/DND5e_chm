<H2>龙纹家族 Dragonmarked House</H2>
<P>《艾伯伦：自终末战争中崛起》中包含了关于龙纹家族的基本信息，本书的第二章中包含了代表这些家族后裔的角色背景。本节中对各个家族进行了概述，重点介绍了开展家族之间阴谋的契机。它还包括了为属于这些家族的角色们提供的额外恩惠，请使用本章前文的“龙纹家族声望”的声望规则。</P>
