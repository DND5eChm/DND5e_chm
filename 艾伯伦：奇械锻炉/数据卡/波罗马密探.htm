<H1>波罗马密探 Boromar Operatives</H1>
<P>波罗马氏族起初是一个纯半身人家族。尽管其影响力已广泛扩张，但其核心密探依然由家族成员担任。比起赤裸裸的暴力，波罗马密探更倾向于使用欺瞒与贿赂手段，但在必要时，他们也会为了捍卫自身利益而不择手段。除了此处描述的成员外，其他的波罗马密探还包括匪徒、平民、间谍、打手以及武者（见《怪物图鉴》）</P>
