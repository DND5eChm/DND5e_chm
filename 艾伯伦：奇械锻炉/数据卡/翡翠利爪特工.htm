<H1>翡翠利爪特工 Emerald Claw Agents</H1>
<P>翡翠利爪教团的特工们是绝对服从组织及其上级命令的士兵。除本处给出的数据卡外，其成员也涵盖了《怪物图鉴》中的斥候、间谍和武者，且身边常伴有诸如骷髅Skeleton、丧尸Zombie和卡纳斯亡灵士兵 
Karrnathi Undead Soldier（出自《艾伯伦：从终末战争中崛起》）之类的亡灵部队。他们的领导者中也有骸骨骑士Bone 
Knight（同样出自《艾伯伦：从终末战争中崛起》）。</P>
