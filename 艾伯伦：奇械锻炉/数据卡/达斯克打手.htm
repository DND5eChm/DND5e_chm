<H1>达斯克打手 Daask Enforcers</H1>
<P>达斯克在萨恩的特工构成复杂，既有在城内招募的幻身灵、地精、人类和化兽者，也有从卓姆远道而来的怪物：鬣狗人、鸟妖、美杜莎、牛头人、食人魔、巨魔，以及一位名叫卡瓦菈的恶鬼首领。值得注意的是，卓姆的鬣狗人并未受到耶诺古恶魔之力的污染。这类打手大多使用此处提供的数据卡。</P>
