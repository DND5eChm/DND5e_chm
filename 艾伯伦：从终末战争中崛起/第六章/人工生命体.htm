<H2>人工生命体 Homunculi</H2>
<P>人工生命体是为特定任务而造的构装仆从。目前绝大多数人工生命体均出自奇械师与法师之手。<BR>这类造物种类繁多，躯体形态各异，其构筑材料包括黏土、生铁，乃至毛发与羽毛的碎屑。在创造过程中，这些材料需与创造者的血液混合，再通过一场漫长的魔法仪式方能活化。<BR><STRONG>构装本质Construct 
Nature。</STRONG>人工生命体不需要空气、食物、饮水或睡眠。</P>
