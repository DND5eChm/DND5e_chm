<H2>梦灵 Quori</H2>
<P>达库尔乃梦境之位面，目前由名为伊-拉什塔瓦，亦称黑暗梦境的黑暗力量所主宰。效命于伊-拉什塔瓦的是一群异怪，梦境与梦魇的化身——梦灵。由于任何东西都极难以物理方式往返达库尔，因此在艾伯伦遭遇的梦灵通常附身于宿主。蒙启者是梦灵最常见的自愿宿主，本章前文已对其进行了详细描述。</P>
