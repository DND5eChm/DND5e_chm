<H2>恐龙 Dinosaurs</H2>
<P>恐龙在艾伯伦分布广泛，尤多见于夸巴拉、塔伦塔平原、希恩德瑞克以及阿贡尼森。小型恐龙在夸巴拉与塔伦塔平原十分常见，其中也包括被塔伦塔半身人广泛用作坐骑的各种品种。<BR></P>
