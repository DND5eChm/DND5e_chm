<H2>魔法物品 Magic Items</H2>
<P>魔法的伟力在艾伯伦世界中激荡。奇械师、魔匠师、法师以及其他施法者制造了海量的魔法物品，其中以普通稀有度的物品最为充裕。</P>
<H3>魔法物品详述 Magic Item Descriptions</H3>
<P>本节按字母顺序列举了一系列魔法物品。关于使用魔法物品的规则请参阅《城主指南》。<BR>本章中的部分魔法物品是由异变魔创造的共生体。这些共生体虽然不具备完全的自我意识，但却拥有部分生物机能。与此类物品同调意味着你要在物理上与其合体。尽管这些物件本身并不邪恶，但当他人目睹你身披活体护甲或挥舞触手长鞭时，恐怕还是会感到脊背发凉！</P>
