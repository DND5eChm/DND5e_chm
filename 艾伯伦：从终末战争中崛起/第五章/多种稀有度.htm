<H6 id="Glamerweave">
幻纺 Glamerweave
</H6>
<P><EM>奇物，普通或非普通</EM><BR>幻纺是一种注入了无害幻术魔法的衣物。着装此类衣物期间，你可以用一个附赠动作在织物中创造出流动的幻象图案。<BR>非普通的幻纺可以让这些图案脱离织物，向上升起。例如，一件幻纺长裙可能被无害的幻象火焰所环绕，而一顶幻纺帽子周围则可能有幻象蝴蝶翩翩起舞。<BR>你在着装非普通版本的谲幻织物期间进行魅力（表演）或魅力（游说）检定时，可以投掷一颗d4并将骰值加入至检定中。此词条一经使用，直到下个黎明前都无法再次使用。</P>
