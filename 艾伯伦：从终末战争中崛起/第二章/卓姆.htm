<H1 align=center><FONT color=#000000>冬宫遭受围攻</FONT> </H1>
<HR style="HEIGHT: 2px; COLOR: #808080">

<P>尽管冬宫在长达百年之久的战争中毫发无损，却还是遭到了意料之外的袭击——来自布蕾兰人民的袭击。这场大胆的袭击导致冬宫东翼陷入火海，而一个自称自由之剑的组织宣称对此负责。袭击发生时，布蕾兰王室成员均不在场。<BR>自由之剑组织呼吁通过暴力推翻维纳恩王朝，要求将所有权力交由布蕾兰议会。他们的宣言援引了鲁肯·伊尔克拉恩领主的讲话，但鲁肯领主本人已谴责了他们的行为。“同室操戈，终无胜时。”他在罗特说道，“但我希望博拉内尔国王能看到，变革的时代已经来临。请您帮助我们实现权力的和平过渡，以免更多无辜者受到伤害。”</P></DIV>
