<H2>科瓦雷诸国 Nations of Khorvaire</H2>
<P>下面几节着重介绍在科瓦雷创造角色与NPC时需要了解的内容。若需了解关于伽利法王国、从王国余烬中崛起的五国，以及维持科瓦雷诸国和平的《王座堡条约》的一般信息，请参阅本书引言。<BR>科瓦雷中部诸国之间有完善的道路系统，旅人通常可以骑马或乘坐马车通行。欧瑞恩家族的闪电列车则连通了科瓦雷的主要城市，让人既能避开道路上的危险，也能免于旅途的枯燥。若旅人追求速度，还可以搭乘黎兰达家族的飞艇——这是最快，但同时也是最昂贵的的旅行方式。本书引言中还提供了关于这些及其他旅行方式的更多信息。</P>
