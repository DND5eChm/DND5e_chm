<H1>罗丝卓尔 Drow of Lolth
</H1>

<p class=sum>服侍蛛后的精灵
</p>

<div class="HT"><STRONG>栖息地：</STRONG>

幽暗地域；<STRONG>宝藏：</STRONG>
任意
</div>

<P>广袤无垠的幽暗地域中，在诸如魔索布莱这样的城市里，众多卓尔精灵信奉着蛛后罗丝。这些自千年前就从地表被放逐的卓尔们如今已然在将幽暗地域视为她们真正的家园。她们阴毒计划包括袭击地表，算计彼此，以及准备最终圣战。
</P>
