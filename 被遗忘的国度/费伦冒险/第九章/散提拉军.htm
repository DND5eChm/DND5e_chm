<H1>散提拉军 Zhentilar
</H1>

<p class=sum>散塔林会的捍卫者们
</p>

<div class="HT"><STRONG>栖息地：</STRONG>

任意；<STRONG>宝藏：</STRONG>
武备
</div>

<P>散提拉军是散塔林会的军事分支。散提拉军势力捍卫着散塔林会的要塞，诸如散提尔堡与黑暗堡。如果说散塔林会是一支大家庭，那么散提拉军便是家中捍卫亲人的长兄长姐。
<BR>除了捍卫据点，散提拉军也负责组织上的某些重要事务，例如保护一件强大的魔法物品，或是护送散塔林会高层。


</P>
