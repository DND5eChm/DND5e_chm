<H1>邪教徒 Cultists
</H1>

<p class=sum>死亡三神的邪恶狂信者
</p>

<div class="HT"><STRONG>栖息地：</STRONG>

城市；<STRONG>宝藏：</STRONG>
个体，圣物
</div>

<P>曾为冒险者的班恩、巴尔与米尔寇攫取了神位，却因其傲慢而被弑杀。可三者皆已复生，如今以"死亡三神"的名号著称于世。死亡三神的每位都催生了追随其暴政、谋杀与死灵术之道的邪恶教派。
<BR>死亡三神以比其他任何神祇都更甚的恶劣方式直接影响着费伦——尤其是博德之门这座城市。那些直接从其主神处领受神旨的邪教徒，往往是最野心勃勃也最危险的。

</P>
