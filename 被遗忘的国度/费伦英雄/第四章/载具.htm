<H3>货篷车 Covered Wagon (250 GP)</H3>

<P><STRONG>谷地特产</STRONG> 
<BR>冒险者们蜂拥至谷地是不是很奇怪？不只是因为那里有雄伟森林和美味啤酒，更因为在这里，每个人都只想管好自己。这种马车在现役和退役的冒险者中非常流行，它的足迹遍布从雷霆山口到巨龙海岸的每一个角落。<BR>这种载具是一种四轮货车（见《玩家手册》），其车身覆盖着耐用的帆布。生物骑乘在此载具内期间具有四分之三掩护。</P>
