<P><STRONG>月影群岛特产</STRONG>  
<BR>雅廷琴是费伦吟游诗人最主要的弦乐器。西特琴的外形独特，其琴身呈梨形，能发出悦耳且更丰满的声音。班多里琴是一种复杂的低音乐器，其琴弦更多，非常适合在合奏中为中高音乐器提供伴奏。<BR>雅廷琴、班多里琴、西特琴是三种
