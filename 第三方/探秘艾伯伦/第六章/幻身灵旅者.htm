<H3>幻身灵旅者 Changeling Traveler</H3>
<P><STRONG>属性值：</STRONG>敏捷、感知、魅力<BR><STRONG>专长：</STRONG>专注面具<BR><STRONG>技能熟练：</STRONG>欺瞒和巧手<BR><STRONG>工具熟练：</STRONG>盗贼工具<BR><STRONG>装备：</STRONG> 
选择A或B：(A)2匕首、盗贼工具、铺盖、2小包、易纺服装，10GP；或(B)50GP。</P>
<P>你是一名漂泊的城市流浪者，从一座城市到另一座城市。你在童年随家人一同游历四方，凭借自身的能力躲避敌人。你是否立志成为推动世间向善的变革之力，抑或只是一位伺机而动的利己之人？大多数幻身灵旅者本身就是幻身灵，如果你并非幻身灵，那么你出生于一个幻身灵家庭，并与他们一同游历；你可以借助易容工具或幻术魔法来模拟他们的能力。</P>
