<H3>达坎地精 Dhakaani Goblinoids</H3>
<P> 
达坎角色通常成长于各个氏族的地下堡垒Kech 
vaults之中，其背景反映出他们在氏族社会中的职责。在地下堡垒严密管控的体系之下，真正的罪犯极为罕见，但罪犯、骗子或者流浪者背景都可以用来体现间谍或静默族成员的训练经历。对于杜尔·卡拉角色Duur'kala，智者或艺人都是不错的选择，尽管这些吟游诗人远不只是单纯的艺人。无论你选择哪种背景，本章都提供了一些专为达坎角色设计的替代起源专长。达坎之梦专长对所有的达坎角色开放，而静默训练专长则专为沉默者的成员准备。在获得DM许可的情况下，你可以用其中一个起源专长，替换通常由背景所赋予的专长。</P>
