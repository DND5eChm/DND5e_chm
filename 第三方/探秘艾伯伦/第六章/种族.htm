<H2>种族 Species</H2>
<P>英雄可以诞生于世界的任何角落。本节介绍了一些体现艾伯伦独特多元文化的种族与血统：与艾伯伦的诸位面及宗教体系相连的阿斯莫；刻克达坎<FONT color=#808080 size=2>（译注：地精语，意为“持（达坎）传统者”）</FONT> 
的达族；兹尼尔盟会的鬣狗人；约衮塔珥半兽人；以及近期出现在摩洛领的厄兆者。如果你的DM允许，你便可以选择扮演其中任一种族。</P>
