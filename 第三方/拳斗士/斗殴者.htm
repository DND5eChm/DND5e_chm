<H1>斗殴者 Brawlers
</H1>

<p class=sum>喧嚣之徒与市井莽汉
</p>

<div class="HT"><STRONG>栖息地：</STRONG>
任意；<STRONG>宝藏：</STRONG>个体
</div>

<P>斗殴者喧闹而又莽撞，追求及时行乐或是干上一架，当然最好是两者兼得。他们大多是劳工或匠人，手头宽裕时便尽情畅饮以宣泄过剩的精力，囊中羞涩时则直接拳脚相向。其中技艺尤为精湛的，甚至能以搏斗供人取乐谋生。
</P>
